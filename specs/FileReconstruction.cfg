\* FileReconstruction TLC Model Configuration
\* MAX_FRAGMENTS = 3 and MAX_REPAIRS = 3 keep the state space tractable
\* for exhaustive model checking while covering meaningful scenarios.

CONSTANT
    MAX_FRAGMENTS = 3
    MAX_REPAIRS = 3

SPECIFICATION
    Spec

\* --- Safety Invariants ---

INVARIANT
    TypeOK
    RepairIdempotency
    NoDataInvention
    OriginalPreserved
    StateProgression
    RepairTraceability
    TerminalStatesStable

\* --- Action Constraint (valid state transitions) ---

ACTION_CONSTRAINT
    ValidTransitions

\* --- Liveness Properties ---

PROPERTY
    ReconstructionTerminates
    ValidationExecutes
