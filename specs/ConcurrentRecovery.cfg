\* ConcurrentRecovery TLC Model Configuration
\* MAX_JOBS = 3 keeps the state space tractable for exhaustive checking
\* while exercising meaningful contention (3 jobs competing for 1 lock).

CONSTANT
    MAX_JOBS = 3

SPECIFICATION
    Spec

\* --- Safety Invariants ---

INVARIANT
    TypeOK
    MutualExclusion
    LockHolderIsActive
    LockHolderIsReading
    CompletedJobsAreDone
    NoDeadlock
    FairScheduling
    NoDuplicatesInQueue
    DoneJobsInactive
    CompletedSubsetOfJobs

\* --- Liveness Properties ---

PROPERTY
    AllJobsComplete
    LockEventuallyReleased
    NoStarvation
